# aqua - Declarative CLI Version Manager
# https://aquaproj.github.io/
# checksum:
#   enabled: true
#   require_checksum: true
#   supported_envs:
#   - all
registries:
  - type: standard
    ref: v4.501.0 # renovate: depName=aquaproj/aqua-registry
packages:
  - name: rossmacarthur/sheldon@0.8.5
    description: ":bowtie: Fast, configurable, shell plugin manager"
    link: https://github.com/rossmacarthur/sheldon
  - name: starship/starship@v1.25.0
    description: The minimal, blazing-fast, and infinitely customizable prompt for any shell
    link: https://github.com/starship/starship
  - name: rhysd/actionlint@v1.7.12
    description: Static checker for GitHub Actions workflow files
    link: https://github.com/rhysd/actionlint
  - name: denoland/deno@v2.7.14
    description: A modern runtime for JavaScript and TypeScript
    link: https://github.com/denoland/deno
  - name: junegunn/fzf@v0.72.0
    description: ":cherry_blossom: A command-line fuzzy finder"
    link: https://github.com/junegunn/fzf
  - name: cli/cli@v2.91.0
    description: GitHub’s official command line tool
    link: https://github.com/cli/cli
  - name: x-motemen/ghq@v1.10.1
    description: Remote repository management made easy
    link: https://github.com/x-motemen/ghq
  - name: jqlang/jq@jq-1.8.1
    description: Command-line JSON processor
    link: https://github.com/jqlang/jq
  - name: tealdeer-rs/tealdeer@v1.8.1
    description: A very fast implementation of tldr in Rust
    link: https://github.com/tealdeer-rs/tealdeer
  - name: jdx/mise@v2026.4.27
    description: dev tools, env vars, task runner
    link: https://github.com/jdx/mise
  - name: dandavison/delta@0.19.2
    description: A syntax-highlighting pager for git, diff, and grep output
    link: https://github.com/dandavison/delta
  - name: neovim/neovim@v0.12.2
    description: Vim-fork focused on extensibility and usability
    link: https://github.com/neovim/neovim
  - name: LuaLS/lua-language-server@3.18.2
    description: A language server that offers Lua language support - programmed in Lua
    link: https://github.com/LuaLS/lua-language-server
  - name: sharkdp/bat@v0.26.1
    description: A cat(1) clone with wings
    link: https://github.com/sharkdp/bat
  - name: jesseduffield/lazygit@v0.61.1
    description: simple terminal UI for git commands
    link: https://github.com/jesseduffield/lazygit
  - name: sxyazi/yazi@v26.1.22
    description: Blazing fast terminal file manager written in Rust, based on async I/O
    link: https://github.com/sxyazi/yazi
  - name: anthropics/claude-code@v2.1.123
    description: "Claude Code is an agentic coding tool that lives in your terminal, understands your codebase, and helps you code faster by executing routine tasks, explaining complex code, and handling git workflows - all through natural language commands"
    link: https://github.com/anthropics/claude-code
  - name: ast-grep/ast-grep@0.42.1
    description: A CLI tool for code structural search, lint and rewriting. Written in Rust
    link: https://github.com/ast-grep/ast-grep
  - name: evilmartians/lefthook@v2.1.6
    description: Fast and powerful Git hooks manager for any type of projects
    link: https://github.com/evilmartians/lefthook
  - name: LargeModGames/spotatui@v0.38.1
    description: A fully standalone Spotify client for the terminal. Native streaming included, no daemon required
    link: https://github.com/LargeModGames/spotatui
